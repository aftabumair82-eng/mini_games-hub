<!DOCTYPE html>
<html>
<head>
<title>Quiz Game</title>
<style>
body { font-family:Arial; text-align:center; background:#222; color:white; }
button { display:block; margin:10px auto; padding:10px; width:200px; }
</style>
</head>

<body>

<h1>Quiz Game</h1>

<h2 id="q"></h2>
<div id="opt"></div>
<h3 id="score"></h3>

<script>
let data = [
 {q:"HTML is?",o:["Language","OS","DB"],a:0},
 {q:"CSS is for?",o:["Style","Logic","Server"],a:0},
 {q:"JS is?",o:["Programming","Painting","Music"],a:0}
];

let i=0,score=0;

function load(){
 if(i>=data.length){
   document.getElementById("q").innerText="Game Over";
   document.getElementById("opt").innerHTML="";
   document.getElementById("score").innerText="Score: "+score;
   return;
 }

 document.getElementById("q").innerText=data[i].q;
 let box=document.getElementById("opt");
 box.innerHTML="";

 data[i].o.forEach((x,idx)=>{
   let b=document.createElement("button");
   b.innerText=x;
   b.onclick=()=>{
     if(idx==data[i].a) score++;
     i++; load();
   };
   box.appendChild(b);
 });
}

load();
</script>

</body>
</html>
