<!DOCTYPE html>
<html>
<head>
<title>Tic Tac Toe</title>
<style>
body { text-align:center; font-family:Arial; background:#111; color:white; }
.board { display:grid; grid-template-columns:repeat(3,100px); justify-content:center; margin-top:30px; }
.box { width:100px; height:100px; font-size:30px; cursor:pointer; }
</style>
</head>

<body>

<h1>Tic Tac Toe</h1>

<div class="board" id="board"></div>
<h2 id="status"></h2>

<script>
let board = ["","","","","","","","",""];
let player = "X";

function draw(){
    let b = document.getElementById("board");
    b.innerHTML = "";
    board.forEach((val,i)=>{
        let btn = document.createElement("button");
        btn.className="box";
        btn.innerText = val;
        btn.onclick = ()=>move(i);
        b.appendChild(btn);
    });
}

function move(i){
    if(board[i]!="") return;
    board[i]=player;
    player = player=="X"?"O":"X";
    draw();
    check();
}

function check(){
    let w = [
        [0,1,2],[3,4,5],[6,7,8],
        [0,3,6],[1,4,7],[2,5,8],
        [0,4,8],[2,4,6]
    ];

    for(let c of w){
        if(board[c[0]] && board[c[0]]==board[c[1]] && board[c[1]]==board[c[2]]){
            document.getElementById("status").innerText = board[c[0]] + " Wins!";
        }
    }
}

draw();
</script>

</body>
</html>
