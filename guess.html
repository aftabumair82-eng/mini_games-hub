<!DOCTYPE html>
<html>
<head>
<title>Guess Game</title>
</head>

<body style="text-align:center;font-family:Arial;background:#000;color:white">

<h1>Guess Number (1-10)</h1>

<input id="num" type="number">
<button onclick="check()">Guess</button>

<h2 id="res"></h2>

<script>
let n = Math.floor(Math.random()*10)+1;

function check(){
 let v = document.getElementById("num").value;
 if(v==n){
   document.getElementById("res").innerText="Correct 🎉";
 }else{
   document.getElementById("res").innerText="Wrong ❌";
 }
}
</script>

</body>
</html>
