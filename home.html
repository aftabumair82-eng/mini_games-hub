<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mini Games Hub</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: linear-gradient(to right, #141e30, #243b55);
    color: white;
}

.card {
    cursor: pointer;
    transition: 0.3s;
    border: none;
    font-size: 18px;
    font-weight: bold;
}

.card:hover {
    transform: scale(1.05);
    background: #444 !important;
}
</style>

</head>

<body>

<nav class="navbar navbar-dark bg-black">
  <div class="container">
    <span class="navbar-brand fw-bold">🔥 Mini Games Hub</span>
  </div>
</nav>

<div class="container text-center mt-5">

  <h1 class="mb-4">🎮 Choose Your Game</h1>

  <div class="row g-4">

    <div class="col-md-3">
      <div class="card bg-secondary p-4" onclick="openGame('tic.html')">
        🎯 Tic Tac Toe
      </div>
    </div>

    <div class="col-md-3">
      <div class="card bg-secondary p-4" onclick="openGame('quiz.html')">
        🧠 Quiz Game
      </div>
    </div>

    <div class="col-md-3">
      <div class="card bg-secondary p-4" onclick="openGame('guess.html')">
        🔢 Number Guess
      </div>
    </div>

    <div class="col-md-3">
      <div class="card bg-secondary p-4" onclick="openGame('typing.html')">
        ⌨️ Typing Game
      </div>
    </div>

  </div>

</div>

<script>
function openGame(page){
    window.location.href = page;
}
</script>

</body>
</html>
